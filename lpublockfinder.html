<!DOCTYPE html>
<html>
<head>
    <title>LPU Block Finder</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            color: #333;
        }

        input {
            width: 300px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 450px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            text-align: left;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        a {
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>LPU Block Finder</h1>
    <p>Find any block in LPU Campus</p>

    <input type="text"
           id="blockInput"
           placeholder="Enter Block Number (e.g. Block 34)">
           
    <button onclick="findBlock()">Search</button>

    <div id="result"></div>

</div>

<script>

    },

    "8": {

    },

    "9": {

        gps: "31.2536° N, 75.7037° E"
    },

    "10": {

        gps: "31.2536° N, 75.7037° E"
    },

    "11": {
        name: "School of Fashion Design",
        gps: "31.2536° N, 75.7037° E"
    },

    "12": {

    },

    "13": {

    },

    "25": {

    },

    "26": {

    "27": {

    "55": {

        gps: "31.2536° N, 75.7037° E"
    },

    "uni-mall": {
        name: "University Shopping Mall, Food Court & Student Utilities",
        gps: "31.2536° N, 75.7037° E"
    }
};

function findBlock() {

    let block = document.getElementById("blockInput").value
        .trim()
        .toLowerCase();

    block = block.replace("block", "").trim();

    if(block === "uni mall"){
        block = "uni-mall";
    }

    let result = document.getElementById("result");

    if(blocks[block]){

        result.innerHTML = `
            <div class="card">
                <h2>✅ Block Found</h2>

                <p><strong>Block:</strong> ${block.toUpperCase()}</p>

                <p><strong>Department:</strong>
                ${blocks[block].name}</p>

                <p><strong>Coordinates:</strong>
                ${blocks[block].gps}</p>

                <p>
                    <a href="https://www.google.com/maps?q=31.2536,75.7037"
                       target="_blank">
                       📍 Open in Google Maps
                    </a>
                </p>
            </div>
        `;

    } else {

        result.innerHTML = `
            <div class="card">
                <p class="error">❌ Block Not Found</p>
                <p>Please enter a valid block number.</p>
            </div>
        `;
    }
}

document.getElementById("blockInput")
.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        findBlock();
    }
});

</script>

</body>
</html>
